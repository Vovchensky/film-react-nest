name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Вход в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка и публикация образа backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/vovchensky/film-react-nest-backend:latest
            ghcr.io/vovchensky/film-react-nest-backend:${{ github.sha }}

      - name: Сборка и публикация образа frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/vovchensky/film-react-nest-frontend:latest
            ghcr.io/vovchensky/film-react-nest-frontend:${{ github.sha }}

      - name: Сборка и публикация образа nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/vovchensky/film-react-nest-nginx:latest
            ghcr.io/vovchensky/film-react-nest-nginx:${{ github.sha }}